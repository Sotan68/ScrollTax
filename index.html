<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScrollTax | Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00f2ff; 
            --secondary: #7000ff; 
            --danger: #ff4757;
            --bg: #020617; 
            --surface: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.08);
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at 0% 0%, #1e1b4b 0%, #020617 100%); 
            color: #f8fafc; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }

        .bento-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 20px;
            max-width: 1000px;
            width: 95%;
            padding: 20px;
        }

        .card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 30px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(0, 242, 255, 0.1); }

        /* Span columns for the main displays */
        .col-2 { grid-column: span 2; }
        .row-2 { grid-row: span 2; }

        /* Input Card Styles */
        h1 { font-size: 1.8rem; margin: 0; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .tabs { display: flex; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 12px; margin: 20px 0; }
        .tab { flex: 1; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; font-weight: 700; color: #64748b; text-align: center; transition: 0.2s; }
        .tab.active { background: #1e293b; color: var(--primary); }

        input[type=range] { width: 100%; height: 6px; border-radius: 10px; background: #1e293b; -webkit-appearance: none; margin: 15px 0; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #fff; border-radius: 50%; box-shadow: 0 0 15px var(--primary); cursor: pointer; }

        /* Stats & Visuals */
        .big-number { font-size: 4rem; font-weight: 800; display: block; margin: 10px 0; color: #fff; }
        
        /* The Life Drain Bar */
        .progress-container { height: 8px; background: #1e293b; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        #lifeBar { height: 100%; width: 30%; background: var(--primary); transition: 0.5s ease; box-shadow: 0 0 10px var(--primary); }

        /* Roast Display */
        .roast-content { font-size: 1.4rem; line-height: 1.4; color: #cbd5e1; height: 100%; display: flex; flex-direction: column; justify-content: center; }
        .roast-icon { font-size: 3rem; margin-bottom: 20px; display: block; }
        .roast-text b { color: var(--primary); }

        .btn-shuffle {
            background: #fff; color: #020617; border: none; padding: 15px; border-radius: 16px;
            font-weight: 800; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 20px;
        }
        .btn-shuffle:hover { background: var(--primary); letter-spacing: 1px; }

        @media (max-width: 768px) { .bento-container { grid-template-columns: 1fr; } .col-2, .row-2 { grid-column: span 1; grid-row: span 1; } }
    </style>
</head>

    function setHorizon(days, element) {

    function shuffle() {
        currentFactIndex = (currentFactIndex + 1) % facts.length;

    function updateUI() {
        const daily = document.getElementById('hourInput').value;
        const totalHours = daily * currentHorizon;
        const fact = facts[currentFactIndex];
        
        // Update Labels
        document.getElementById('hourLabel').innerText = daily + "h";
        document.getElementById('annualHours').innerText = Math.floor(totalHours).toLocaleString();
        
        // Update Progress Bar & Status
        const intensity = (daily / 12) * 100;
        const lifeBar = document.getElementById('lifeBar');
        lifeBar.style.width = intensity + "%";
        
        if(intensity > 70) {
            lifeBar.style.background = "var(--danger)";
            lifeBar.style.boxShadow = "0 0 15px var(--danger)";
            document.getElementById('statusText').innerText = "Digital Zombie";
            document.getElementById('statusText').style.color = "var(--danger)";
        } else {
            lifeBar.style.background = "var(--primary)";
            lifeBar.style.boxShadow = "0 0 15px var(--primary)";
            document.getElementById('statusText').innerText = intensity > 30 ? "Productive Potato" : "Focused Human";
            document.getElementById('statusText').style.color = "var(--primary)";
        }

        // Update Roast
        let result = fact.text.includes("$") ? (totalHours * 20).toLocaleString() : (totalHours / fact.cost).toFixed(1);
        document.getElementById('factOutput').innerHTML = fact.text.replace("{n}", result);
        document.getElementById('roastIcon').innerText = fact.icon || "⚡";
    }
