<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScrollTax | Premium Life Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00f2ff; 
            --secondary: #7000ff; 
            --danger: #ff4757;
            --bg: #020617; 
            --surface: rgba(15, 23, 42, 0.4);
            --border: rgba(255, 255, 255, 0.08);
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg);
            color: #f8fafc; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- BACKGROUND SYSTEM --- */
        .bg-glow {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1;
    background: var(--bg);
    overflow: hidden;
}
        .bg-glow::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url("https://grainy-gradients.vercel.app/noise.svg");
    filter: contrast(150%) brightness(1000%);
    opacity: 0.04;
    z-index: 2;
    pointer-events: none;
}
        .danger-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 0% 0%, #450a0a 0%, #020617 100%);
            opacity: 0;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .grid-overlay {
    position: absolute;
    inset: 0;
    /* This creates a clean 40px square grid */
    background-image: 
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    /* This makes the grid fade out toward the edges for a "vignette" look */
    mask-image: radial-gradient(circle at center, black 30%, transparent 90%);
    -webkit-mask-image: radial-gradient(circle at center, black 30%, transparent 90%);
    z-index: 1;
}
        .blob {
    position: absolute;
    width: 800px; height: 800px;
    background: radial-gradient(circle, var(--secondary) 0%, transparent 70%);
    filter: blur(120px);
    opacity: 0.08; /* Super subtle, just a hint of color */
    border-radius: 50%;
    animation: move 25s infinite alternate ease-in-out;
    z-index: 0;
}
        .blob:nth-child(3) { 
    background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
    left: 50%; top: -10%; 
    width: 1000px;
}

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5vw, -5vh) scale(1); }
        }

        /* --- BENTO LAYOUT --- */
        .bento-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 20px;
            max-width: 1000px;
            width: 95%;
            padding: 20px;
        }

        .card {
            background: var(--surface);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(0, 242, 255, 0.1); }
        .col-2 { grid-column: span 2; }
        .row-2 { grid-row: span 2; }

        h1 { font-size: 1.8rem; margin: 0; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* --- TABS & SLIDER --- */
        .tabs { display: flex; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 12px; margin: 20px 0; }
        .tab { flex: 1; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; font-weight: 700; color: #64748b; text-align: center; transition: 0.2s; }
        .tab.active { background: #1e293b; color: var(--primary); }

        input[type=range] { width: 100%; height: 6px; border-radius: 10px; background: #1e293b; -webkit-appearance: none; margin: 15px 0; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #fff; border-radius: 50%; box-shadow: 0 0 15px var(--primary); cursor: pointer; }

        .progress-container { height: 8px; background: #1e293b; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        #lifeBar { height: 100%; width: 30%; background: var(--primary); transition: 0.5s ease; }

        /* --- DATA TEXT --- */
        .tax-main { font-size: 3.5rem; font-weight: 800; line-height: 1; color: #fff; margin: 15px 0; }
        .tax-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 10px; }
        .tax-sub { font-size: 0.9rem; font-weight: 700; color: var(--primary); opacity: 0.8; }

        /* --- ROAST CONTENT --- */
        .roast-layout { display: grid; grid-template-columns: 80px 1fr; gap: 20px; align-items: center; text-align: left; min-height: 120px; }
        .roast-icon { font-size: 3.5rem; display: flex; align-items: center; justify-content: center; }
        .roast-text { font-size: 1.3rem; line-height: 1.4; color: #cbd5e1; }
        .roast-text b { color: var(--primary); font-size: 1.6rem; }

        .rank-bar { height: 4px; width: 100%; background: #1e293b; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        #rankFill { height: 100%; width: 30%; background: var(--primary); transition: 0.5s; }

        .btn-shuffle {
            background: #fff; color: #020617; border: none; padding: 18px; border-radius: 20px;
            font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 25px;
            text-transform: uppercase; letter-spacing: 1px; width: 100%;
        }
        .btn-shuffle:hover { background: var(--primary); transform: scale(1.02); }

        @keyframes jolt { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        .jolt-effect { animation: jolt 0.2s ease-in-out; }

        @media (max-width: 768px) { .bento-container { grid-template-columns: 1fr; } .col-2, .row-2 { grid-column: span 1; } .roast-layout { grid-template-columns: 1fr; text-align: center; } }
    </style>
</head>
<body>

<div class="bg-glow">
    <div class="danger-overlay" id="dangerOverlay"></div>
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="grid-overlay"></div> </div>

<div class="bento-container">
    <div class="card col-2">
        <h1>ScrollTax</h1>
        <div class="tabs">
            <div class="tab" onclick="setHorizon(30, this)">MONTH</div>
            <div class="tab active" onclick="setHorizon(365, this)">YEAR</div>
            <div class="tab" onclick="setHorizon(1825, this)">5 YEARS</div>
        </div>
        <div style="display:flex; justify-content:space-between; font-weight:700; font-size:0.8rem">
            <span style="color:#64748b">DAILY USAGE</span>
            <span id="hourLabel" style="color:var(--primary)">3h</span>
        </div>
        <input type="range" id="hourInput" min="1" max="12" value="3" oninput="updateUI()">
        <div class="progress-container"><div id="lifeBar"></div></div>
    </div>

    <div class="card">
        <span style="font-size:0.7rem; font-weight:800; color:#64748b">TOTAL LIFE TAX</span>
        <div class="tax-main" id="annualHours">1,095</div>
        <div class="tax-row">
            <span style="font-size:0.8rem; font-weight:600; color:#64748b">HOURS LOST</span>
            <span class="tax-sub" id="moneyLost">$21,900</span>
        </div>
    </div>

    <div class="card col-2 row-2" id="roastCard">
        <div class="roast-layout">
            <div class="roast-icon" id="roastIcon">🦾</div>
            <div class="roast-text" id="factOutput">Calculating the damage...</div>
        </div>
        <button class="btn-shuffle" onclick="shuffle()">SHUFFLE REALITY</button>
    </div>

    <div class="card">
        <span style="font-size:0.7rem; font-weight:800; color:#64748b">CURRENT RANK</span>
        <p id="statusText" style="font-weight:700; color:var(--primary); margin:10px 0;">Productive Potato</p>
        <div class="rank-bar"><div id="rankFill"></div></div>
    </div>
</div>

<script>
    let currentHorizon = 365;
    let currentFactIndex = 0;

    const facts = [
        { text: "In that time, you could've learned <b>Japanese</b> to a conversational level <b>{n}</b> times.", cost: 600, icon: "🎎" },
        { text: "You could've completed <b>Harvard's CS50</b> coding course <b>{n}</b> times. Imagine the salary.", cost: 80, icon: "👨‍💻" },
        { text: "You could've read <b>{n}</b> life-changing books. You'd be the smartest person in the room.", cost: 15, icon: "📚" },
        { text: "You could've earned a <b>Private Pilot License</b> <b>{n}</b> times. Flying > Scrolling.", cost: 50, icon: "✈️" },
        { text: "You could've learned to <b>play the Piano</b> <b>{n}</b> times.", cost: 400, icon: "🎹" },
        { text: "You could've mastered <b>Python</b> and automated your life <b>{n}</b> times.", cost: 150, icon: "🐍" },
        { text: "You could've finished a <b>Master's Degree</b> <b>{n}</b> times.", cost: 1000, icon: "🎓" },
        { text: "You could've gained <b>{n} kg of pure muscle</b>. Stop being a 'before' picture.", cost: 150, icon: "🦾" },
        { text: "You could've done <b>{n},000 pushups</b>. You'd be built like a Greek God.", cost: 0.01, icon: "🔱" },
        { text: "You could've bought <b>{n} Pepperoni Pizzas</b> with the money you *didn't* earn.", cost: 0.75, icon: "🍕" },
        { text: "You could've watched the <b>Shrek</b> series <b>{n}</b> times. Peak happiness.", cost: 8, icon: "👹" },
        { text: "You could've earned <b>${n}</b> working a basic side hustle.", cost: 0.05, icon: "💰" },
        { text: "You could've <b>called your mom</b> <b>{n}</b> times. She legit thinks you're dead.", cost: 0.5, icon: "📞" },
        { text: "You could've <b>touched grass</b> <b>{n}</b> times. Real, green, non-pixelated grass.", cost: 0.5, icon: "🌱" },
        { text: "You could've explained the <b>entire plot of FNAF</b> <b>{n}</b> times.", cost: 10, icon: "🐻" },
        { text: "You could've built <b>{n}</b> successful <b>Minecraft</b> civilizations.", cost: 100, icon: "⛏️" },
        { text: "You could've learned to <b>Backflip</b> <b>{n}</b> times. Gravity-defying glory.", cost: 40, icon: "🤸‍♂️" },
        { text: "You've lost enough time to watch <b>One Piece</b> <b>{n}</b> times. All of it.", cost: 450, icon: "🏴‍☠️" },
        { text: "You could've learned <b>Sign Language</b> <b>{n}</b> times.", cost: 300, icon: "🤟" },
        { text: "You could've watched <b>Interstellar</b> <b>{n}</b> times. This little maneuver cost us 51 years.", cost: 3, icon: "👨‍🚀" },
        { text: "You could've earned enough to buy <b>{n}</b> brand new <b>Teslas</b>.", cost: 2000, icon: "🚗" },
        { text: "You could've learned to <b>Forge a Samurai Sword</b> <b>{n}</b> times. Sharp.", cost: 80, icon: "🗡️" },
        { text: "You could've learned to <b>Tame a Falcon</b> <b>{n}</b> times. Fly, birdy.", cost: 200, icon: "🦅" },
        { text: "You could've built <b>{n}</b> custom <b>Mechanical Keyboards</b>. Clicky.", cost: 5, icon: "⌨️" },
        { text: "You could've mastered <b>Espresso Latte Art</b> <b>{n}</b> times.", cost: 40, icon: "☕" },
        { text: "You could've learned <b>Lockpicking</b> <b>{n}</b> times. (For legal purposes).", cost: 20, icon: "🔓" },
        { text: "You could've mastered the <b>Yo-Yo</b> <b>{n}</b> times. It's coming back.", cost: 10, icon: "🪀" },
        { text: "You could've learned to <b>Unicycle</b> <b>{n}</b> times. Circus life awaits.", cost: 15, icon: "🚲" },
        { text: "You could've memorized every <b>Capital City</b> <b>{n}</b> times.", cost: 10, icon: "🗺️" },
        { text: "You could've learned <b>Glassblowing</b> <b>{n}</b> times. Hot.", cost: 150, icon: "🔥" },
        { text: "You could've mastered <b>Pottery</b> <b>{n}</b> times. Ghost vibes.", cost: 100, icon: "🏺" },
        { text: "You could've mastered <b>Tax Loopholes</b> <b>{n}</b> times. Save that cash.", cost: 60, icon: "⚖️" },
        { text: "You could've mastered <b>Origami</b> life-sized dragons <b>{n}</b> times.", cost: 200, icon: "🐉" }
        // ... (Remaining facts included in your internal script) ...
    ];

    function setHorizon(days, element) {
        currentHorizon = days;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        element.classList.add('active');
        updateUI();
    }

    function shuffle() {
        const card = document.getElementById('roastCard');
        card.classList.remove('jolt-effect');
        void card.offsetWidth;
        card.classList.add('jolt-effect');
        currentFactIndex = (currentFactIndex + 1) % facts.length;
        updateUI();
    }

    function updateUI() {
        const daily = document.getElementById('hourInput').value;
        const totalHours = daily * currentHorizon;
        const fact = facts[currentFactIndex];
        
        // 1. Basic Data
        document.getElementById('hourLabel').innerText = daily + "h";
        document.getElementById('annualHours').innerText = Math.floor(totalHours).toLocaleString();
        document.getElementById('moneyLost').innerText = "$" + (totalHours * 20).toLocaleString();

        const intensity = (daily / 12) * 100;
        
        // 2. THE THEME ENGINE
        let status = "";
        let themePrimary = "";
        let themeSecondary = "";
        let overlayOpacity = 0;

        if (intensity <= 25) {
            status = "Focused Human";
            themePrimary = "#00f2ff";   // Cyan
            themeSecondary = "#7000ff"; // Purple
            overlayOpacity = 0;
        } 
        else if (intensity <= 50) {
            status = "Less Socially Functional";
            themePrimary = "#f1c40f";   // Yellow
            themeSecondary = "#e67e22"; // Orange
            overlayOpacity = 0.3;
        } 
        else if (intensity <= 75) {
            status = "Algorithm's Puppet";
            themePrimary = "#e67e22";   // Orange
            themeSecondary = "#d35400"; // Deep Orange
            overlayOpacity = 0.6;
        } 
        else {
            status = "Brain Rot Champion";
            themePrimary = "#ff4757";   // Red
            themeSecondary = "#991b1b"; // Deep Blood Red
            overlayOpacity = 1;
        }

        // 3. APPLY THEME TO ENTIRE SITE
        const root = document.documentElement;
        root.style.setProperty('--primary', themePrimary);
        root.style.setProperty('--secondary', themeSecondary);
        
        // Apply text and overlays
        document.getElementById('statusText').innerText = status;
        document.getElementById('statusText').style.color = themePrimary;
        document.getElementById('dangerOverlay').style.opacity = overlayOpacity;
        
        // Update Bar Widths
        document.getElementById('lifeBar').style.width = intensity + "%";
        document.getElementById('rankFill').style.width = intensity + "%";
        
        // 4. Update Roast Content
        let result = fact.text.includes("$") ? (totalHours * 20).toLocaleString() : (totalHours / fact.cost).toFixed(1);
        document.getElementById('factOutput').innerHTML = fact.text.replace("{n}", result);
        document.getElementById('roastIcon').innerText = fact.icon || "⚡";
    }

    updateUI();
</script>

</body>
</html>
